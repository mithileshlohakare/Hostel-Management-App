version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: hostelsync-db
    environment:
      POSTGRES_USER: hostelsync
      POSTGRES_PASSWORD: hostelsync
      POSTGRES_DB: hostelsync
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hostelsync -d hostelsync']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hostelsync-backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://hostelsync:hostelsync@db:5432/hostelsync
      CORS_ORIGINS: http://localhost:3000
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostelsync-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/updates
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
